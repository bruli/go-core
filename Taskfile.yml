version: '3'

vars:
  GOLANGCI_LINT_VERSION: 'v2.11.4'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format code with gofumpt
    cmds:
      - |
        set -euo pipefail
        echo "👉 Formatting code with gofumpt..."
        go tool gofumpt -w .

  fix:
    desc: Fix code
    cmds:
      - |
        set -euo pipefail
        echo "👉 Fixing code with go fix..."
        go fix -v ./...

  security:
    desc: Check security vulnerabilities
    cmds:
      - |
        set -euo pipefail
        echo "👉 Check security"
        go tool govulncheck ./...

  install-lint:
    desc: Install golangci-lint
    cmds:
      - |
        set -euo pipefail
        echo "🔧 Installing golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}

  lint:
    desc: Run golangci-lint
    deps:
      - install-lint
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Executing golangci-lint..."
        golangci-lint run ./...

  test:
    desc: Run unit tests
    cmds:
      - |
        set -euo pipefail
        echo "🧪 Running unit tests (race, JSON → tparse)..."
        go test -race ./... -json -cover -coverprofile=coverage.out | go tool tparse -all

  check:
    desc: Run format, security, lint and tests
    cmds:
      - task: fmt
      - task: fix
      - task: security
      - task: lint
      - task: test

  clean:
    desc: Clean local artifacts
    cmds:
      - |
        set -euo pipefail
        echo "🧹 Cleaning local artifacts..."
        rm -rf bin dist coverage .*cache || true
        go clean -testcache
